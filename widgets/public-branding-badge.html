<!DOCTYPE html>
<html>

    <style>

        .rmv-badge {
            background: #0f172a; color: #f59e0b; padding: 12px 20px; border-radius: 10px;
            display: inline-flex; align-items: center; font-family: 'Segoe UI', sans-serif;
            border: 2px solid #f59e0b; box-shadow: 0 4px 15px rgba(0,0,0,0.3);

        .rmv-badge:hover { transform: scale(1.05); background: #1e293b; }
        .rmv-logo { font-weight: 900; font-size: 1.1rem; margin-right: 12px; border-right: 1px solid #475569; padding-right: 12px; }
        .rmv-text { font-size: 0.85rem; font-weight: 600; }
    </style>
</head>
<body>
    <a href="https://sites.google.com/view/rmvapexgroup" target="_blank" class="rmv-badge">
        <div class="rmv-logo">RMV APEX 🚩</div>
        <div class="rmv-text">OFFICIAL PUBLIC HUB<br><small style="color:#94a3b8; font-weight:normal;">by Ramesh Mewalal Vishwakarma</small></div>
    </a>
</body>
</html>
