<div style="background:white; padding:15px; border-radius:10px; border:2px solid #f59e0b; font-family:sans-serif; text-align:center;">
    <h3 style="color:#0f172a; margin-bottom:10px;">RMV Quick Calc</h3>
    <input id="amt" type="number" placeholder="राशि (Amount)" style="width:90%; padding:8px; margin:5px; border:1px solid #ccc; border-radius:5px;">
    <input id="rate" type="number" placeholder="दर (Rate %)" style="width:90%; padding:8px; margin:5px; border:1px solid #ccc; border-radius:5px;">
    <button onclick="calculateNow()" style="background:#f59e0b; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold; width:95%;">हिसाब करें</button>
    <div id="result" style="margin-top:15px; font-weight:bold; color:#0f172a; font-size:1.1rem;"></div>
</div>

<script>
    function calculateNow() {
        const a = parseFloat(document.getElementById('amt').value);
        const r = parseFloat(document.getElementById('rate').value);
        if(!a || !r) {
            document.getElementById('result').innerHTML = "कृपया सही अंक भरें!";
            return;
        }
        const res = (a * r) / 100;
        document.getElementById('result').innerHTML = "ब्याज (Interest): ₹" + res.toFixed(2);
    }
</script>
